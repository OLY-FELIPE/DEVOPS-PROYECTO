<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e2a3a; font-family: 'Segoe UI', sans-serif; }
        .metric-card { background: white; border-radius: 1rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; }
        .metric-value { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2>Monitoreo de Infraestructura EC2</h2>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="metric-card">
                        <h5>CPU</h5>
                        <div class="metric-value" id="cpuVal">--</div>
                        <small>Última actualización: <span id="timeVal">--</span></small>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric-card">
                        <h5>RAM</h5>
                        <div class="metric-value" id="ramVal">--</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric-card">
                        <h5>Disco (/)</h5>
                        <div class="metric-value" id="diskVal">--</div>
                    </div>
                </div>
            </div>
            <hr>
            <div class="text-center">
                <a href="http://18.218.94.83:9090/targets" target="_blank" class="btn btn-sm btn-outline-secondary">Ver Prometheus Targets</a>
                <a href="http://18.218.94.83:3000" target="_blank" class="btn btn-sm btn-outline-secondary">Ir a Grafana</a>
            </div>
        </div>
    </div>
</div>

<script>
    const PUBLIC_IP = "18.218.94.83";

    async function fetchMetric(query) {
        try {
            const url = `http://${PUBLIC_IP}:9090/api/v1/query?query=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.data.result && data.data.result.length > 0) {
                return parseFloat(data.data.result[0].value[1]);
            }
        } catch(e) { console.error(e); }
        return null;
    }

    async function updateMetrics() {
        const cpuQuery = '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)';
        const ramQuery = '(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100';
        const diskQuery = '(node_filesystem_size_bytes{device="/dev/root"} - node_filesystem_avail_bytes{device="/dev/root"}) / node_filesystem_size_bytes{device="/dev/root"} * 100';

        const cpu = await fetchMetric(cpuQuery);
        const ram = await fetchMetric(ramQuery);
        const disk = await fetchMetric(diskQuery);

        document.getElementById('cpuVal').innerText = (cpu !== null) ? cpu.toFixed(1) + '%' : '--';
        document.getElementById('ramVal').innerText = (ram !== null) ? ram.toFixed(1) + '%' : '--';
        document.getElementById('diskVal').innerText = (disk !== null) ? disk.toFixed(1) + '%' : '--';
        document.getElementById('timeVal').innerText = new Date().toLocaleTimeString();
    }

    updateMetrics();
    setInterval(updateMetrics, 5000);
</script>
</body>
</html>
